openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trade Therapist API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: trades
    description: Trade journal operations
  - name: insights
    description: Analytics and insights
  - name: report
    description: Weekly psychology report

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after login.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to OIDC logout.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List all trades with journal analysis
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeWithJournal"
    post:
      operationId: createTrade
      tags: [trades]
      summary: Create a trade with voice transcript — runs AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTradeBody"
      responses:
        "201":
          description: Created trade with AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeWithJournal"

  /trades/{id}:
    delete:
      operationId: deleteTrade
      tags: [trades]
      summary: Delete a trade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: Get aggregated data for charts
      responses:
        "200":
          description: Insights data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsData"

  /report/weekly:
    post:
      operationId: generateWeeklyReport
      tags: [report]
      summary: Generate and save a weekly psychology report in Dr. Trade voice
      responses:
        "200":
          description: Saved report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReport"

  /reports:
    get:
      operationId: listReports
      tags: [report]
      summary: List all saved reports (summaries, newest first)
      responses:
        "200":
          description: List of report summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummary"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [report]
      summary: Get a single saved report by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Full saved report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /streaks:
    get:
      operationId: getStreaks
      tags: [insights]
      summary: Get current and all-time best streaks
      responses:
        "200":
          description: Streak statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreaksData"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    TradeWithJournal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        ticker:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: [number, 'null']
        size:
          type: number
        pnl:
          type: [number, 'null']
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time
        journal:
          oneOf:
            - $ref: '#/components/schemas/JournalAnalysis'
            - type: 'null'
      required: [id, userId, ticker, side, entryPrice, size, openedAt, createdAt]

    JournalAnalysis:
      type: object
      properties:
        id:
          type: integer
        tradeId:
          type: integer
        transcript:
          type: string
        emotion:
          type: string
          enum: [calm, fomo, fear, greed, revenge, hope, frustration, confidence]
        emotionScore:
          type: number
        planFollowingScore:
          type: number
        tags:
          type: array
          items:
            type: string
        verdict:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, tradeId, transcript, emotion, emotionScore, planFollowingScore, tags, verdict, createdAt]

    CreateTradeBody:
      type: object
      properties:
        ticker:
          type: string
        side:
          type: string
          enum: [long, short]
        entryPrice:
          type: number
        exitPrice:
          type: [number, 'null']
        size:
          type: number
        pnl:
          type: [number, 'null']
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: [string, 'null']
          format: date-time
        transcript:
          type: string
      required: [ticker, side, entryPrice, size, openedAt, transcript]

    InsightsData:
      type: object
      properties:
        winRateByEmotion:
          type: array
          items:
            type: object
            properties:
              emotion:
                type: string
              winRate:
                type: number
              tradeCount:
                type: integer
            required: [emotion, winRate, tradeCount]
        pnlByHour:
          type: array
          items:
            type: object
            properties:
              hour:
                type: integer
              avgPnl:
                type: number
              tradeCount:
                type: integer
            required: [hour, avgPnl, tradeCount]
        triggerWords:
          type: array
          items:
            type: object
            properties:
              word:
                type: string
              count:
                type: integer
            required: [word, count]
        summary:
          type: object
          properties:
            totalTrades:
              type: integer
            totalPnl:
              type: number
            winRate:
              type: number
            mostCommonEmotion:
              type: string
            calmWinRate:
              type: number
            fomoWinRate:
              type: number
          required: [totalTrades, totalPnl, winRate]
      required: [winRateByEmotion, pnlByHour, triggerWords, summary]

    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        weekStart:
          type: string
          format: date-time
        weekEnd:
          type: string
          format: date-time
        tradeCount:
          type: integer
        totalPnl:
          type: [number, 'null']
        dominantEmotion:
          type: [string, 'null']
        generatedAt:
          type: string
          format: date-time
      required: [id, weekStart, weekEnd, tradeCount, generatedAt]

    SavedReport:
      type: object
      properties:
        id:
          type: integer
        markdown:
          type: string
        weekStart:
          type: string
          format: date-time
        weekEnd:
          type: string
          format: date-time
        tradeCount:
          type: integer
        totalPnl:
          type: [number, 'null']
        dominantEmotion:
          type: [string, 'null']
        generatedAt:
          type: string
          format: date-time
      required: [id, markdown, weekStart, weekEnd, tradeCount, generatedAt]

    WeeklyReport:
      type: object
      properties:
        markdown:
          type: string
        generatedAt:
          type: string
          format: date-time
      required: [markdown, generatedAt]

    StreakStat:
      type: object
      properties:
        current:
          type: integer
        best:
          type: integer
      required: [current, best]

    StreaksData:
      type: object
      properties:
        calmWinStreak:
          $ref: "#/components/schemas/StreakStat"
        disciplineStreak:
          $ref: "#/components/schemas/StreakStat"
        fomoFreeDays:
          $ref: "#/components/schemas/StreakStat"
      required: [calmWinStreak, disciplineStreak, fomoFreeDays]
