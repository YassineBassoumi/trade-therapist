kind = "web"
previewPath = "/"
title = "Trade Therapist"
version = "1.0.0"
id = "artifacts/trade-therapist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25299

[services.development]
run = "pnpm --filter @workspace/trade-therapist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trade-therapist", "run", "build" ]
publicDir = "artifacts/trade-therapist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25299"
BASE_PATH = "/"
